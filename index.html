<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Deja de ser tú · Joe Dispenza</title>
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Deja%20de%20ser%20t%C3%BA%22,%22short_name%22:%22Deja%20de%20ser%22,%22start_url%22:%22./%22,%22scope%22:%22./%22,%22display%22:%22standalone%22,%22theme_color%22:%22%231A3652%22,%22background_color%22:%22%23F0F4F8%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ccircle%20cx='50'%20cy='50'%20r='48'%20fill='%231A3652'/%3E%3Cpath%20fill='%23F2C94C'%20d='M35%2042%20L65%2042%20L62%2058%20L38%2058%20Z'/%3E%3C/svg%3E%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22}]}">
    <style>
        body { font-family: system-ui; background: #F0F4F8; padding: 1rem; }
        .container { max-width: 780px; margin: 0 auto; background: white; border-radius: 32px; padding: 1.5rem; }
        button { background: #2C5282; color: white; padding: 12px 24px; border: none; border-radius: 60px; font-size: 16px; margin: 5px; }
        .btn-install { background: #F2C94C; color: #1A3652; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>🧠 Deja de ser tú</h1>
    <p>Joe Dispenza</p>
    <button id="audioBtn">🔊 Escuchar análisis</button>
    <button id="stopBtn">⏹️ Detener</button>
    <button id="installBtn" class="btn-install" style="display:none;">📲 Instalar app</button>
    <p id="status"></p>
</div>

<script>
    // AUDIO
    const synth = window.speechSynthesis;
    let utterance = null;
    
    document.getElementById('audioBtn').onclick = () => {
        if (synth.speaking) synth.cancel();
        const texto = "Deja de ser tú de Joe Dispenza. El libro explica cómo la neuroplasticidad permite cambiar patrones mentales. La práctica de meditación y visualización transforma la personalidad. En Cuba, esta herramienta es poderosa porque no requiere recursos externos. El plan incluye quince minutos diarios de meditación, observación de emociones y visualización de la nueva versión de ti mismo. Conclusión: el cambio comienza en tu mente.";
        utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'es-ES';
        synth.speak(utterance);
        document.getElementById('status').innerText = '🔊 Reproduciendo...';
    };
    
    document.getElementById('stopBtn').onclick = () => {
        synth.cancel();
        document.getElementById('status').innerText = '⏹️ Detenido';
    };
    
    // INSTALACIÓN
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'inline-block';
    });
    
    document.getElementById('installBtn').onclick = async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            document.getElementById('installBtn').style.display = 'none';
        }
    };
    
    // SERVICE WORKER (mínimo)
    if ('serviceWorker' in navigator) {
        const swCode = `self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response('Offline'))));`;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
</script>
</body>
</html>
